<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clements 49 — morph window picker</title><style>
html,body{margin:0;height:100%;background:#111;font:12px system-ui,-apple-system,sans-serif;color:#ddd;overflow:hidden}
#wrap{position:absolute;inset:0}
svg{width:100%;height:100%;touch-action:none}
#t{position:fixed;top:8px;left:12px;font-weight:700;color:#eee;pointer-events:none;line-height:1.35}
#t small{display:block;font-weight:400;color:#999}
#out{position:fixed;right:10px;top:10px;background:#1a1a20ee;border:1px solid #3a3a42;border-radius:8px;padding:8px 10px;width:270px}
#out table{width:100%;border-collapse:collapse;font-size:11px}
#out td{padding:2px 4px;color:#ccc}#out td:first-child{font-weight:700}
#out textarea{width:100%;height:74px;background:#0c0c10;color:#9fe0a8;border:1px solid #333;border-radius:5px;font:10px ui-monospace,monospace;margin-top:6px}
button{background:#232329;color:#eee;border:1px solid #4a4a52;border-radius:6px;padding:4px 10px;cursor:pointer;margin-top:6px}
.dot{cursor:grab}.dot:active{cursor:grabbing}
#hint{position:fixed;left:12px;bottom:10px;color:#888}
</style></head><body>
<div id="t">Morph window picker<small>drag the four dots along the green spine · wheel = zoom · drag background = pan</small></div>
<div id="wrap"><svg id="svg" viewBox="-20 -20 1370 1965">
<path id="rrail" fill="none" stroke="#e63030" stroke-width="2" opacity="0.4"/>
<path id="brail" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
<path id="gspine" fill="none" stroke="#22c55e" stroke-width="4"/>
<path id="shseg" fill="none" stroke="#a855f7" stroke-width="9" stroke-linecap="round"/>
<path id="crseg" fill="none" stroke="#ef4444" stroke-width="9" stroke-linecap="round"/>
<g id="marks"></g>
</svg></div>
<div id="out"><b>transition anchors</b>
<table id="tab"></table>
<textarea id="json" readonly></textarea>
<button id="cp">copy spec</button> <button id="rs">reset to current algorithm</button></div>
<div id="hint">sh_in→sh_out = shoulder morph window · cr_in→cr_out = crown morph window (cr_out = rose start)</div>
<script>
var D=__DATA__;
var NS='http://www.w3.org/2000/svg';
var svg=document.getElementById('svg');
document.getElementById('rrail').setAttribute('d',D.red);
document.getElementById('brail').setAttribute('d',D.blue);
document.getElementById('gspine').setAttribute('d','M '+D.spine.map(function(p){return p[0]+','+p[1];}).join(' L '));
var NAMES=["sh_in","sh_out","cr_in","cr_out"];
var LBL={sh_in:"shoulder morph START",sh_out:"shoulder morph STOP",cr_in:"crown morph START",cr_out:"crown morph STOP = rose start"};
var COLS={sh_in:"#a855f7",sh_out:"#a855f7",cr_in:"#ef4444",cr_out:"#ef4444"};
function nearest(x,y){var bi=0,bd=1e18;for(var i=0;i<D.spine.length;i++){var dx=D.spine[i][0]-x,dy=D.spine[i][1]-y,d=dx*dx+dy*dy;if(d<bd){bd=d;bi=i;}}return bi;}
var idx={};NAMES.forEach(function(n){idx[n]=nearest(D.init[n][0],D.init[n][1]);});
var g=document.getElementById('marks'),dots={},labels={};
NAMES.forEach(function(n){
  var c=document.createElementNS(NS,'circle');c.setAttribute('r','14');c.setAttribute('fill',COLS[n]);
  c.setAttribute('stroke','#fff');c.setAttribute('stroke-width','3');c.setAttribute('class','dot');c.dataset.n=n;
  g.appendChild(c);dots[n]=c;
  var t=document.createElementNS(NS,'text');t.setAttribute('fill','#fff');t.setAttribute('font-size','24');t.setAttribute('font-weight','700');
  g.appendChild(t);labels[n]=t;
});
function stOf(i){return Math.round(D.s[i]/D.total*(D.S-1));}
function upd(){
  NAMES.forEach(function(n){
    var p=D.spine[idx[n]];dots[n].setAttribute('cx',p[0]);dots[n].setAttribute('cy',p[1]);
    labels[n].setAttribute('x',p[0]+20);labels[n].setAttribute('y',p[1]-14);labels[n].textContent=n+' st'+stOf(idx[n]);
  });
  function seg(a,b){var i0=Math.min(idx[a],idx[b]),i1=Math.max(idx[a],idx[b]);
    return 'M '+D.spine.slice(i0,i1+1).map(function(p){return p[0]+','+p[1];}).join(' L ');}
  document.getElementById('shseg').setAttribute('d',seg('sh_in','sh_out'));
  document.getElementById('crseg').setAttribute('d',seg('cr_in','cr_out'));
  var rows='',spec={S:D.S};
  NAMES.forEach(function(n){var i=idx[n],p=D.spine[i];
    rows+='<tr><td style="color:'+COLS[n]+'">'+n+'</td><td>('+p[0].toFixed(1)+', '+p[1].toFixed(1)+')</td><td>s='+D.s[i].toFixed(0)+'</td><td>st'+stOf(i)+'</td></tr>';
    spec[n]={x:+p[0].toFixed(1),y:+p[1].toFixed(1),s:+D.s[i].toFixed(1),st:stOf(i)};
  });
  document.getElementById('tab').innerHTML=rows;
  document.getElementById('json').value=JSON.stringify(spec);
}
upd();
/* interactions */
var V={x:-20,y:-20,w:1370,h:1965},B=Object.assign({},V);
function A(){svg.setAttribute('viewBox',V.x+' '+V.y+' '+V.w+' '+V.h);}
function toSvg(e){var r=svg.getBoundingClientRect();
  /* meet scaling */
  var sc=Math.min(r.width/V.w,r.height/V.h);
  var ox=(r.width-V.w*sc)/2, oy=(r.height-V.h*sc)/2;
  return [V.x+(e.clientX-r.left-ox)/sc, V.y+(e.clientY-r.top-oy)/sc];
}
var dragDot=null,panning=false,px,py;
svg.addEventListener('pointerdown',function(e){
  if(e.target.classList&&e.target.classList.contains('dot')){dragDot=e.target.dataset.n;svg.setPointerCapture(e.pointerId);}
  else{panning=true;px=e.clientX;py=e.clientY;}
});
svg.addEventListener('pointermove',function(e){
  if(dragDot){var q=toSvg(e);idx[dragDot]=nearest(q[0],q[1]);upd();}
  else if(panning){var r=svg.getBoundingClientRect();var sc=Math.min(r.width/V.w,r.height/V.h);
    V.x-=(e.clientX-px)/sc;V.y-=(e.clientY-py)/sc;px=e.clientX;py=e.clientY;A();}
});
addEventListener('pointerup',function(){dragDot=null;panning=false;});
svg.addEventListener('wheel',function(e){e.preventDefault();var q=toSvg(e),f=e.deltaY<0?0.87:1.15;
  V.x=q[0]-(q[0]-V.x)*f;V.y=q[1]-(q[1]-V.y)*f;V.w*=f;V.h*=f;A();},{passive:false});
document.getElementById('cp').onclick=function(){var ta=document.getElementById('json');ta.select();document.execCommand('copy');this.textContent='copied ✓';var b=this;setTimeout(function(){b.textContent='copy spec';},1200);};
document.getElementById('rs').onclick=function(){NAMES.forEach(function(n){idx[n]=nearest(D.init[n][0],D.init[n][1]);});upd();};
</script></body></html>
