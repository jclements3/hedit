<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" font-family="Georgia,serif">
<defs>
<linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8a8f97"/><stop offset="1" stop-color="#4c5158"/></linearGradient>
<linearGradient id="steel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e6eaef"/><stop offset="1" stop-color="#6a6f78"/></linearGradient>
<radialGradient id="pin" cx=".4" cy=".4" r=".7"><stop offset="0" stop-color="#e2e6ec"/><stop offset="1" stop-color="#6a6f78"/></radialGradient></defs>
<rect width="980" height="470" fill="#13110d"/>
<text x="490" y="32" fill="#eef0f4" font-size="16" text-anchor="middle">one disc, exploded along the axle — what touches what</text>
<line x1="150" y1="230" x2="820" y2="230" stroke="#cfd4da" stroke-width="6" stroke-linecap="round"/>
<text x="485" y="138" fill="#cfd4da" font-size="12" text-anchor="middle">AXLE (one rigid shaft) — carries the turning force</text>
<line x1="485" y1="144" x2="485" y2="222" stroke="#cfd4da" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="120" y1="160" x2="120" y2="300" stroke="#b8924a" stroke-width="6" stroke-linecap="round"/>
<text x="120" y="322" fill="#b8924a" font-size="11" text-anchor="middle">string</text>
<rect x="221" y="172" width="18" height="116" rx="9" fill="url(#steel)" stroke="#eef0f4" stroke-width="1"/>
<circle cx="230" cy="230" r="6" fill="#23262b"/>
<rect x="120" y="255" width="110" height="10" rx="5" fill="url(#pin)" stroke="#eef0f4" stroke-width="0.6"/>
<rect x="120" y="195" width="110" height="10" rx="5" fill="url(#pin)" stroke="#eef0f4" stroke-width="0.6"/>
<text x="230" y="160" fill="#cdd2da" font-size="11" text-anchor="middle">disc plate</text>
<text x="175" y="152" fill="#9aa0a8" font-size="10" text-anchor="middle">prongs</text>
<text x="230" y="322" fill="#9ad8b0" font-size="10" text-anchor="middle">fixed to axle</text>
<text x="175" y="338" fill="#b8924a" font-size="10" text-anchor="middle">prongs grip string (engaged)</text>
<text x="232" y="166" fill="#ff8c5a" font-size="9" text-anchor="middle">edge: free — nothing touches</text>
<rect x="408" y="135" width="44" height="190" fill="url(#bar)" stroke="#2d3036"/>
<circle cx="430" cy="230" r="9" fill="#13110d" stroke="#9aa0a8" stroke-width="1"/>
<text x="430" y="126" fill="#aeb3bd" font-size="11" text-anchor="middle">bar ¼″</text>
<text x="430" y="342" fill="#9ad8b0" font-size="10" text-anchor="middle">axle turns in this hole = the ONLY bearing</text>
<line x1="600" y1="230" x2="600" y2="184" stroke="#2a2d31" stroke-width="6"/>
<circle cx="600" cy="230" r="6" fill="#23262b"/>
<circle cx="600" cy="184" r="4.5" fill="#e0b86e"/>
<text x="600" y="322" fill="#9ad8b0" font-size="10" text-anchor="middle">crank — fixed to axle</text>
<text x="630" y="184" fill="#e0b86e" font-size="10">crank pin</text>
<line x1="600" y1="184" x2="720" y2="172" stroke="#cfd4da" stroke-width="3"/>
<text x="660" y="166" fill="#cfd4da" font-size="10" text-anchor="middle">link</text>
<rect x="720" y="140" width="120" height="9" rx="4" fill="url(#steel)" stroke="#9aa0a8" stroke-width="0.6" transform="rotate(8 720 172)"/>
<circle cx="720" cy="172" r="4" fill="#9aa0a8"/>
<text x="790" y="144" fill="#9aa0a8" font-size="10" text-anchor="middle">action rod (slides)</text>
<text x="780" y="322" fill="#cdd2da" font-size="10" text-anchor="middle">link pushes the crank pin</text>
<text x="490" y="440" fill="#8a8f98" font-size="12" text-anchor="middle">force path:  rod → link → crank pin → crank → AXLE → disc → prongs → string   (nothing drives the disc by its edge)</text>
</svg>