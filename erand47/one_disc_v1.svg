<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" font-family="Georgia,serif">
<defs>
<linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8a8f97"/><stop offset="1" stop-color="#4c5158"/></linearGradient>
<linearGradient id="steel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e6eaef"/><stop offset="1" stop-color="#6a6f78"/></linearGradient>
<marker id="rot" markerWidth="9" markerHeight="9" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#e0b86e"/></marker></defs>
<rect width="980" height="520" fill="#13110d"/>
<text x="490" y="30" fill="#eef0f4" font-size="16" text-anchor="middle">one disc — what connects to it, and where</text>
<text x="250" y="62" fill="#cdd2da" font-size="13" text-anchor="middle">depth section — disc on string side, crank on back, axle through bar</text>
<line x1="150" y1="200" x2="150" y2="340" stroke="#b8924a" stroke-width="5" stroke-linecap="round"/>
<text x="150" y="360" fill="#b8924a" font-size="10" text-anchor="middle">string y=0</text>
<rect x="200" y="244" width="22" height="52" rx="4" fill="url(#steel)" stroke="#eef0f4" stroke-width="1"/>
<text x="210" y="236" fill="#cdd2da" font-size="10" text-anchor="middle">disc</text>
<rect x="150" y="280" width="50" height="8" rx="4" fill="url(#steel)" stroke="#eef0f4" stroke-width="0.6"/>
<rect x="150" y="252" width="50" height="8" rx="4" fill="url(#steel)" stroke="#eef0f4" stroke-width="0.6"/>
<text x="174" y="268" fill="#9aa0a8" font-size="9" text-anchor="middle">prongs</text>
<rect x="222" y="175" width="70" height="190" fill="url(#bar)" stroke="#2d3036"/>
<text x="257" y="166" fill="#aeb3bd" font-size="10" text-anchor="middle">bar ¼″ (journal)</text>
<line x1="210" y1="270" x2="337" y2="270" stroke="#cfd4da" stroke-width="6" stroke-linecap="round"/>
<text x="238" y="286" fill="#cfd4da" font-size="10" text-anchor="middle">axle</text>
<line x1="315" y1="270" x2="315" y2="236" stroke="#2a2d31" stroke-width="5"/>
<circle cx="315" cy="236" r="3.5" fill="#e0b86e"/>
<line x1="315" y1="236" x2="370" y2="226" stroke="#cfd4da" stroke-width="3"/>
<circle cx="370" cy="226" r="6" fill="url(#steel)" stroke="#9aa0a8"/>
<text x="370" y="216" fill="#9aa0a8" font-size="9" text-anchor="middle">action rod</text>
<text x="326" y="304" fill="#cdd2da" font-size="10" text-anchor="middle">crank + link (back side)</text>
<text x="238" y="388" fill="#8a8f98" font-size="10" text-anchor="middle">string side ← | bar | → back (mechanism)</text>
<text x="720" y="62" fill="#cdd2da" font-size="13" text-anchor="middle">back-face view — rod slides → crank → axle → disc turns</text>
<circle cx="720" cy="270" r="40" fill="#23262b" stroke="#54585f" stroke-width="1" stroke-dasharray="3 3"/>
<text x="720" y="328" fill="#54585f" font-size="9" text-anchor="middle">disc (behind bar)</text>
<circle cx="720" cy="270" r="5" fill="#cfd4da"/>
<text x="730" y="274" fill="#cfd4da" font-size="10">axle</text>
<line x1="720" y1="270" x2="698" y2="229" stroke="#2a2d31" stroke-width="5"/>
<circle cx="698" cy="229" r="4" fill="#e0b86e"/>
<text x="692" y="223" fill="#2a2d31" font-size="10" text-anchor="end" stroke="#cdd2da" stroke-width="0.2">crank</text>
<rect x="570" y="195" width="320" height="8" rx="3" fill="url(#steel)" stroke="#9aa0a8" stroke-width="0.6"/>
<text x="570" y="189" fill="#9aa0a8" font-size="10">action rod (slides →)</text>
<line x1="698" y1="199" x2="698" y2="229" stroke="#cfd4da" stroke-width="3"/>
<circle cx="698" cy="199" r="3" fill="#9aa0a8"/>
<text x="706" y="214" fill="#cfd4da" font-size="9">link</text>
<line x1="720" y1="270" x2="743" y2="230" stroke="#e0b86e" stroke-width="3" stroke-dasharray="4 3" opacity="0.8"/>
<path d="M 738,228 A 46 46 0 0 1 743,230" fill="none" stroke="#e0b86e" stroke-width="1.4" marker-end="url(#rot)"/>
<text x="790" y="250" fill="#e0b86e" font-size="10">~60°</text>
<text x="490" y="500" fill="#8a8f98" font-size="11" text-anchor="middle">disc + axle + crank are one rigid unit; only the link and rod move it · a return spring (not shown) unwinds it on release</text>
</svg>