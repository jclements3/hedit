<svg xmlns="http://www.w3.org/2000/svg" width="940" height="640" viewBox="0 0 940 640" font-family="Georgia,serif">
<rect width="940" height="640" fill="#13110d"/>
<text x="470.0" y="34" fill="#eef0f4" font-size="16" text-anchor="middle">erand47 actuation parts</text>
<text x="60" y="70" fill="#e7c97e" font-size="13">GOLD — standard rigid links (fixed shape; smaller toward treble)</text>
<polygon points="170.0,180.0 198.0,228.5 142.0,228.5" fill="#e7c97e" stroke="#b8973f" stroke-width="2" stroke-linejoin="round"/><circle cx="170.0" cy="180.0" r="20.3" fill="#e7c97e" stroke="#b8973f" stroke-width="2"/><circle cx="198.0" cy="228.5" r="20.3" fill="#e7c97e" stroke="#b8973f" stroke-width="2"/><circle cx="142.0" cy="228.5" r="20.3" fill="#e7c97e" stroke="#b8973f" stroke-width="2"/><circle cx="170.0" cy="180.0" r="10.5" fill="#f3efe6" stroke="#b8973f" stroke-width="1"/><circle cx="198.0" cy="228.5" r="5.6" fill="#f3efe6" stroke="#b8973f" stroke-width="1"/><circle cx="142.0" cy="228.5" r="5.6" fill="#f3efe6" stroke="#b8973f" stroke-width="1"/><text x="170" y="217" fill="#9aa0a8" font-size="9" text-anchor="middle">disc lever (bass)</text><text x="175" y="178" fill="#c0a0ff" font-size="8">c?nta</text><text x="202" y="228" fill="#cfd4da" font-size="8">c?nti</text><text x="138" y="228" fill="#cfd4da" font-size="8" text-anchor="end">c?nto</text>
