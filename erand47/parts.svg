<polygon points="500.0,175.0 550.4,203.0 449.6,203.0" fill="#e7c97e" stroke="#b8973f" stroke-width="2" stroke-linejoin="round"/><circle cx="500.0" cy="175.0" r="20.3" fill="#e7c97e" stroke="#b8973f" stroke-width="2"/><circle cx="550.4" cy="203.0" r="20.3" fill="#e7c97e" stroke="#b8973f" stroke-width="2"/><circle cx="449.6" cy="203.0" r="20.3" fill="#e7c97e" stroke="#b8973f" stroke-width="2"/><circle cx="500.0" cy="175.0" r="5.6" fill="#f3efe6" stroke="#b8973f" stroke-width="1"/><circle cx="550.4" cy="203.0" r="5.6" fill="#f3efe6" stroke="#b8973f" stroke-width="1"/><circle cx="449.6" cy="203.0" r="5.6" fill="#f3efe6" stroke="#b8973f" stroke-width="1"/><text x="500" y="197" fill="#9aa0a8" font-size="9" text-anchor="middle">relay lever</text>
<polygon points="700.0,185.0 686.0,108.0 777.0,199.0" fill="#e7c97e" stroke="#b8973f" stroke-width="2" stroke-linejoin="round"/><circle cx="700.0" cy="185.0" r="20.3" fill="#e7c97e" stroke="#b8973f" stroke-width="2"/><circle cx="686.0" cy="108.0" r="20.3" fill="#e7c97e" stroke="#b8973f" stroke-width="2"/><circle cx="777.0" cy="199.0" r="20.3" fill="#e7c97e" stroke="#b8973f" stroke-width="2"/><circle cx="700.0" cy="185.0" r="10.5" fill="#f3efe6" stroke="#b8973f" stroke-width="1"/><circle cx="686.0" cy="108.0" r="5.6" fill="#f3efe6" stroke="#b8973f" stroke-width="1"/><circle cx="777.0" cy="199.0" r="5.6" fill="#f3efe6" stroke="#b8973f" stroke-width="1"/><text x="700" y="154" fill="#9aa0a8" font-size="9" text-anchor="middle">L bell-crank</text><text x="705" y="185" fill="#9ad8b0" font-size="8">cBCa</text><text x="686" y="105" fill="#7fb0ff" font-size="8" text-anchor="middle">cBCi</text><text x="781" y="199" fill="#cfd4da" font-size="8">cBCo</text>
<text x="60" y="360" fill="#c3c7cd" font-size="13">GREY — connectors (length + curvature from the N/S Bézier)</text>
<path d="M 120.0,430.0 Q 210.0,430.0 300.0,430.0" fill="none" stroke="#7d828a" stroke-width="21.2" stroke-linecap="round"/><path d="M 120.0,430.0 Q 210.0,430.0 300.0,430.0" fill="none" stroke="#c3c7cd" stroke-width="18.2" stroke-linecap="round"/><circle cx="120.0" cy="430.0" r="5.6" fill="#f3efe6" stroke="#7d828a" stroke-width="1"/><circle cx="300.0" cy="430.0" r="5.6" fill="#f3efe6" stroke="#7d828a" stroke-width="1"/><text x="210" y="422" fill="#9aa0a8" font-size="9" text-anchor="middle">short / straight</text>
<path d="M 360.0,440.0 Q 483.5,452.8 600.0,410.0" fill="none" stroke="#7d828a" stroke-width="21.2" stroke-linecap="round"/><path d="M 360.0,440.0 Q 483.5,452.8 600.0,410.0" fill="none" stroke="#c3c7cd" stroke-width="18.2" stroke-linecap="round"/><circle cx="360.0" cy="440.0" r="5.6" fill="#f3efe6" stroke="#7d828a" stroke-width="1"/><circle cx="600.0" cy="410.0" r="5.6" fill="#f3efe6" stroke="#7d828a" stroke-width="1"/><text x="483" y="445" fill="#9aa0a8" font-size="9" text-anchor="middle">medium / slight bow</text>
<path d="M 660.0,460.0 Q 794.6,488.2 900.0,400.0" fill="none" stroke="#7d828a" stroke-width="21.2" stroke-linecap="round"/><path d="M 660.0,460.0 Q 794.6,488.2 900.0,400.0" fill="none" stroke="#c3c7cd" stroke-width="18.2" stroke-linecap="round"/><circle cx="660.0" cy="460.0" r="5.6" fill="#f3efe6" stroke="#7d828a" stroke-width="1"/><circle cx="900.0" cy="400.0" r="5.6" fill="#f3efe6" stroke="#7d828a" stroke-width="1"/><text x="795" y="480" fill="#9aa0a8" font-size="9" text-anchor="middle">long / more bow</text>
<text x="60" y="560" fill="#8a8f98" font-size="11">disc lever: big axle hole = disc spindle (Ø3), two pin holes (Ø1.6), arm 8 mm @ ±30°.</text>
<text x="60" y="582" fill="#8a8f98" font-size="11">bell-crank: bent ternary at the pillar top. relay lever: 3 pin holes, no disc.</text>
<text x="60" y="604" fill="#8a8f98" font-size="11">grey links are the only parts that change per string — everything gold is standard, just scaled.</text>
</svg>